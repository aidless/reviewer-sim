[pytest]
# Pytest configuration for Agentic Academic Review System

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=core
    --cov=agents
    --cov-report=term-missing
    --cov-report=html:htmlcov

# Markers for different test types
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use external APIs)
    slow: Slow tests (skip during quick test runs)
    literature: Tests requiring literature grounding features
    standard: Tests for standard (non-literature) functionality
    provider: Per-provider LLM connectivity tests (requires API keys)

# Coverage options
[coverage:run]
source = .
omit =
    tests/*
    */__pycache__/*
    */site-packages/*
    setup.py
    */migrations/*

[coverage:report]
precision = 2
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract
