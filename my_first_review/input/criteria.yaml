domain: machine_learning

recommendation_thresholds:
  - threshold: 85
    label: "直接接收"
  - threshold: 65
    label: "修改后接收"
  - threshold: 45
    label: "大修后重投"
  - threshold: 0
    label: "拒稿"

criteria:
  - id: technical_soundness
    name: 技术正确性
    description: "严格审查方法、推导和实现的正确性。检查数学基础是否可靠、证明是否无误、是否存在隐藏假设、是否有逻辑漏洞。对任何未经证实的主张保持高度怀疑。"
    weight: 18
    scale:
      type: numeric
      range: [1, 5]
      labels:
        1: "存在根本性错误，方法不可用"
        2: "有重大缺陷，结论存疑"
        3: "基本正确，但存在未被充分讨论的局限"
        4: "技术扎实，正确性有充分保证"
        5: "无可挑剔，每一步都经得起严格推敲"

  - id: originality_novelty
    name: 原创性与新颖性
    description: "严格评估论文是否真正提出了新东西。与已有工作做精确区分，警惕增量式改进伪装成突破。区分'新问题'和'换了个数据集跑已有方法'。"
    weight: 15
    scale:
      type: numeric
      range: [1, 5]
      labels:
        1: "几乎无原创，完全重复或微不足道的改动"
        2: "边际改进，与已有工作的差异不足以构成独立贡献"
        3: "有一定新颖性，但核心 idea 已有先例"
        4: "原创性强，提出了独特的方法或视角"
        5: "开创性工作，定义了新方向"

  - id: experimental_design
    name: 实验设计质量
    description: "严格评估实验是否能真正支撑论文的主张。检查基线是否公平、消融是否充分、超参数是否合理、结论是否过度推广。警惕选择性报告和 cherry-picking。"
    weight: 16
    scale:
      type: numeric
      range: [1, 5]
      labels:
        1: "实验严重不足，无法支撑任何核心主张"
        2: "存在关键缺失，多个主张缺乏实验支撑"
        3: "基本合理，但部分主张的实验证据不充分"
        4: "实验设计严谨，为主张提供了可靠支撑"
        5: "实验堪称典范，每个主张都有铁证支撑"

  - id: statistical_robustness
    name: 统计稳健性
    description: "严格审查统计方法。检验是否适当（为什么用这个检验而非其他）、多重比较是否校正、误差是否充分报告、效应量是否给出。对 p-hacking 和选择性报告零容忍。"
    weight: 12
    scale:
      type: numeric
      range: [1, 5]
      labels:
        1: "无可信的统计处理"
        2: "统计方法不当，结论可能来自噪声"
        3: "基本合理，但有未校正的多重比较或其他疏漏"
        4: "统计严谨，方法选择有据，校正充分"
        5: "统计标杆，所有推断经得起最严格的审查"

  - id: reproducibility
    name: 可复现性
    description: "严格评估复现可能性。代码是否开源、数据是否可获取、实验配置是否完整、超参数是否全部披露。不满足'无代码=不可复现'原则的从严扣分。"
    weight: 12
    scale:
      type: numeric
      range: [1, 5]
      labels:
        1: "完全无法复现，关键信息全缺"
        2: "核心细节缺失，即使有代码也难以复现"
        3: "有代码但缺数据或关键配置"
        4: "代码数据齐全，可独立复现核心结果"
        5: "一键复现，文档完善，全量结果可验证"

  - id: baseline_comparison
    name: 基线对比充分性
    description: "严格评估基线选择。是否遗漏重要的 SOTA 方法、对比是否在同等条件下进行、是否有 cherry-picking 基线的嫌疑。作者有责任证明自己对比了最强的对手。"
    weight: 10
    scale:
      type: numeric
      range: [1, 5]
      labels:
        1: "几乎无基线对比"
        2: "基线选择有明显偏向或遗漏重要方法"
        3: "基本合理但有可补充的强基线"
        4: "基线全面，涵盖了主要竞争对手"
        5: "基线覆盖领域最强方法，对比条件无可挑剔"

  - id: presentation_clarity
    name: 表达清晰度
    description: "严格评估写作和呈现质量。逻辑是否清晰、术语是否定义、图表是否准确传达信息、是否有模糊或误导性表述。差写作=差科学。"
    weight: 9
    scale:
      type: numeric
      range: [1, 5]
      labels:
        1: "混乱难读，严重影响理解"
        2: "清晰度有严重问题，多处模糊或矛盾"
        3: "基本可读，但有多处表达不清或逻辑跳跃"
        4: "表达流畅清晰，逻辑连贯"
        5: "教科书级别的写作与呈现"

  - id: impact_significance
    name: 影响力与意义
    description: "冷酷评估：如果这篇论文从未发表，领域会因此损失什么？区分'有实际价值的工作'和'为了发论文而发论文'。对声称的 impact 保持怀疑，要求具体证据而非空谈。"
    weight: 8
    scale:
      type: numeric
      range: [1, 5]
      labels:
        1: "无意义，发表与否对领域无影响"
        2: "价值有限，仅在小众场景有用"
        3: "有一定参考价值，但影响力有限"
        4: "对领域有实质贡献，可能被广泛引用"
        5: "里程碑式工作，将改变领域方向"
